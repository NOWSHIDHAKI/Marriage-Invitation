<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP Dashboard - Chandhu & Santhi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1208, #2d1e0e);
      color: #f5e8c0;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
      border-bottom: 2px solid #c8922a;
      padding-bottom: 20px;
    }
    h1 {
      font-size: 32px;
      color: #f0b840;
      margin-bottom: 10px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: rgba(30, 18, 8, 0.95);
      border: 1px solid rgba(200, 146, 42, 0.35);
      padding: 20px;
      border-radius: 4px;
      text-align: center;
    }
    .stat-number {
      font-size: 36px;
      font-weight: bold;
      color: #ff9500;
      margin-bottom: 10px;
    }
    .stat-label {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c8922a;
    }
    .filters {
      margin-bottom: 30px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 10px 20px;
      background: rgba(30, 18, 8, 0.9);
      border: 1px solid rgba(200, 146, 42, 0.3);
      color: #f5e8c0;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.3s;
    }
    .filter-btn.active {
      background: #8b1a0a;
      border-color: #c8922a;
      color: #f0b840;
    }
    .filter-btn:hover {
      border-color: #c8922a;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(30, 18, 8, 0.95);
      border: 1px solid rgba(200, 146, 42, 0.2);
      margin-bottom: 30px;
    }
    thead {
      background: rgba(45, 30, 14, 0.9);
      border-bottom: 2px solid #c8922a;
    }
    th {
      padding: 15px;
      text-align: left;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c8922a;
    }
    td {
      padding: 12px 15px;
      border-bottom: 1px solid rgba(200, 146, 42, 0.1);
    }
    tr:hover {
      background: rgba(200, 146, 42, 0.08);
    }
    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .status.attending {
      background: rgba(76, 175, 80, 0.3);
      color: #76ff03;
    }
    .status.declined {
      background: rgba(244, 67, 54, 0.3);
      color: #ff8a80;
    }
    .message {
      color: rgba(245, 224, 160, 0.7);
      font-style: italic;
      max-width: 300px;
      word-break: break-word;
    }
    .empty {
      text-align: center;
      padding: 40px;
      color: rgba(200, 146, 42, 0.5);
    }
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 18px;
      color: #c8922a;
    }
    .error {
      background: rgba(244, 67, 54, 0.2);
      border: 1px solid #ff8a80;
      color: #ff8a80;
      padding: 15px;
      border-radius: 3px;
      margin-bottom: 20px;
    }
    .success {
      background: rgba(76, 175, 80, 0.2);
      border: 1px solid #76ff03;
      color: #c5ff90;
      padding: 15px;
      border-radius: 3px;
      margin-bottom: 20px;
    }
    .export-btn {
      background: #c8922a;
      color: #1a1208;
      padding: 12px 24px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }
    .export-btn:hover {
      background: #f0b840;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>💒 RSVP Dashboard</h1>
      <p>Chandhu ♥ Santhi - Wedding Responses</p>
      <p style="font-size: 12px; color: rgba(200, 146, 42, 0.6); margin-top: 10px;">
        Updated in real-time from Supabase
      </p>
    </header>

    <div id="message" style="margin-bottom: 20px;"></div>

    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="stat-number" id="stat-total">-</div>
        <div class="stat-label">Total Responses</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-attending">-</div>
        <div class="stat-label">Attending</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-guests">-</div>
        <div class="stat-label">Total Guests</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-declined">-</div>
        <div class="stat-label">Declined</div>
      </div>
    </div>

    <div style="margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
      <button class="export-btn" onclick="exportToCSV()">📥 Export to CSV</button>
      <button class="export-btn" onclick="location.reload()">🔄 Refresh</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="filterTable('all')">All Responses</button>
      <button class="filter-btn" onclick="filterTable('attending')">Attending Only</button>
      <button class="filter-btn" onclick="filterTable('declined')">Declined Only</button>
    </div>

    <div id="content">
      <div class="loading">⏳ Loading RSVP data...</div>
    </div>
  </div>

  <script src="supabase-config.js"></script>
  <script>
    let allResponses = [];
    let currentFilter = 'all';

    // Direct Supabase initialization (don't rely on supabase-config)
    function initSupabaseDirectly() {
      return new Promise((resolve, reject) => {
        let attempts = 0;
        const checkInterval = setInterval(() => {
          if (window.supabaseClient) {
            clearInterval(checkInterval);
            console.log('✓ Supabase client found');
            resolve();
          } else if (attempts > 100) {
            clearInterval(checkInterval);
            // Try to load manually if not initialized
            loadSupabaseManually().then(resolve).catch(reject);
          }
          attempts++;
        }, 50);
        
        // Timeout after 5 seconds
        setTimeout(() => {
          clearInterval(checkInterval);
          if (!window.supabaseClient) {
            loadSupabaseManually().then(resolve).catch(reject);
          }
        }, 5000);
      });
    }

    function loadSupabaseManually() {
      return new Promise((resolve, reject) => {
        if (typeof supabase !== 'undefined' && window.supabaseClient) {
          resolve();
          return;
        }

        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.0.0/dist/umd/supabase.js';
        script.onload = () => {
          const SUPABASE_URL = 'https://bwfpowojoqumsjjlwtgwy.supabase.co';
          const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3ZnBvd29qb3Ftc2pqbHd0Z3d5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTYzNTgsImV4cCI6MjA4Nzk3MjM1OH0.tqDABW7l7q21EaAkPm2qSiapj4LMeLlVwaBemCcMGwg';
          
          if (window.supabase) {
            window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log('✓ Supabase manually initialized');
            checkSupabaseConnection();
            resolve();
          } else {
            reject(new Error('Supabase library failed to load'));
          }
        };
        script.onerror = () => reject(new Error('Failed to load Supabase library from CDN'));
        document.head.appendChild(script);
      });
    }

    // Check Supabase connection & table exists
    async function checkSupabaseConnection() {
      try {
        console.log('\n🔍 DIAGNOSTICS:');
        console.log('─'.repeat(50));
        
        // Check if client is ready
        console.log('✓ Supabase client initialized');
        
        // Try to list tables (or check auth)
        const { data: { session } } = await window.supabaseClient.auth.getSession();
        console.log('✓ Auth check passed');
        
        // Try a simple count query
        const { count, error } = await window.supabaseClient
          .from('rsvp_responses')
          .select('*', { count: 'exact', head: true });
        
        if (error) {
          console.error('❌ Cannot access rsvp_responses table:');
          console.error('   Error:', error.message);
          console.error('   Code:', error.code);
          console.log('\n📋 CHECKLIST:');
          console.log('   1. Did you run the SQL setup script in Supabase?');
          console.log('   2. Does rsvp_responses table exist? (Check in Table Editor)');
          console.log('   3. Are RLS policies enabled? (Should be, but check)');
        } else {
          console.log(`✓ Table exists and is accessible (${count || 0} responses)`);
        }
        console.log('─'.repeat(50) + '\n');
      } catch (e) {
        console.error('Diagnostics error:', e);
      }
    }

    async function loadRsvpData() {
      const contentDiv = document.getElementById('content');
      const messageDiv = document.getElementById('message');

      try {
        console.log('Starting data load...');
        
        // Ensure Supabase is initialized
        await initSupabaseDirectly();

        if (!window.supabaseClient) {
          throw new Error('Supabase client still not available after initialization');
        }

        console.log('Fetching responses from Supabase...');
        
        // Fetch directly from Supabase
        const { data, error } = await window.supabaseClient
          .from('rsvp_responses')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) {
          console.error('Supabase query error details:');
          console.error('  Message:', error.message);
          console.error('  Code:', error.code);
          console.error('  Full error:', error);
          
          // More specific error messages
          if (error.message.includes('Failed to fetch')) {
            throw new Error('Network error: Are you offline? Or check if RLS policies are set up. Did you run the SQL setup script?');
          } else if (error.message.includes('relation')) {
            throw new Error('Table does not exist. Did you run the SQL setup script in Supabase?');
          } else if (error.message.includes('permission')) {
            throw new Error('Permission denied. Check RLS policies in Supabase > rsvp_responses table');
          } else {
            throw new Error(`Database error: ${error.message}`);
          }
        }

        console.log('Received data:', data);
        
        const responses = data;
        
        if (!responses) {
          throw new Error('Failed to fetch responses');
        }

        allResponses = responses;

        // Calculate and display stats
        updateStats();

        // Display responses
        displayResponses(allResponses);

        if (responses.length === 0) {
          messageDiv.innerHTML = '<div class="empty">No responses yet. Waiting for the first RSVP!</div>';
        } else {
          messageDiv.innerHTML = `<div class="success">✓ Successfully loaded ${responses.length} response(s)</div>`;
        }

      } catch (error) {
        console.error('Full error details:', error);
        console.error('Error stack:', error.stack);
        messageDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
        contentDiv.innerHTML = `
          <div class="empty">
            <h3>Could not load RSVP data</h3>
            <p style="color: #ff8a80; font-size: 13px; margin-top: 10px;">
              ${error.message}<br>
              <span style="opacity: 0.7; font-size: 11px;">Check browser console (F12) for details</span>
            </p>
          </div>
        `;
      }
    }

    function updateStats() {
      const stats = {
        total: allResponses.length,
        attending: 0,
        declines: 0,
        total_guests: 0
      };

      allResponses.forEach(response => {
        if (response.attending) {
          stats.attending++;
          stats.total_guests += response.num_guests;
        } else {
          stats.declines++;
        }
      });

      document.getElementById('stat-total').textContent = stats.total;
      document.getElementById('stat-attending').textContent = stats.attending;
      document.getElementById('stat-guests').textContent = stats.total_guests;
      document.getElementById('stat-declined').textContent = stats.declines;
    }

    function displayResponses(responses) {
      const contentDiv = document.getElementById('content');

      if (responses.length === 0) {
        contentDiv.innerHTML = '<div class="empty">No responses to display.</div>';
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>Guest Name</th>
              <th>Guests</th>
              <th>Status</th>
              <th>Message</th>
              <th>Submitted</th>
            </tr>
          </thead>
          <tbody>
      `;

      responses.forEach(response => {
        const attending = response.attending ? 'Attending' : 'Declined';
        const statusClass = response.attending ? 'attending' : 'declined';
        const date = new Date(response.created_at).toLocaleDateString();
        const time = new Date(response.created_at).toLocaleTimeString();
        
        html += `
          <tr>
            <td><strong>${escapeHtml(response.guest_name)}</strong></td>
            <td>${response.num_guests}</td>
            <td>
              <span class="status ${statusClass}">${attending}</span>
            </td>
            <td class="message">${response.message ? escapeHtml(response.message) : '-'}</td>
            <td>${date} ${time}</td>
          </tr>
        `;
      });

      html += '</tbody></table>';
      contentDiv.innerHTML = html;
    }

    function filterTable(filter) {
      currentFilter = filter;

      // Update button states
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');

      // Filter responses
      let filtered = allResponses;
      if (filter === 'attending') {
        filtered = allResponses.filter(r => r.attending);
      } else if (filter === 'declined') {
        filtered = allResponses.filter(r => !r.attending);
      }

      displayResponses(filtered);
    }

    function exportToCSV() {
      if (allResponses.length === 0) {
        alert('No data to export');
        return;
      }

      let csv = 'Guest Name,Number of Guests,Attending,Message,Submitted\n';

      allResponses.forEach(response => {
        const name = `"${response.guest_name.replace(/"/g, '""')}"`;
        const message = response.message ? `"${response.message.replace(/"/g, '""')}"` : '-';
        const attending = response.attending ? 'Yes' : 'No';
        const date = new Date(response.created_at).toLocaleString();

        csv += `${name},${response.num_guests},${attending},${message},${date}\n`;
      });

      // Download CSV
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `wedding-rsvp-${new Date().toISOString().split('T')[0]}.csv`;
      document.body.appendChild(a);
      a.click();
      window.URL.revokeObjectURL(url);
      document.body.removeChild(a);
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Load data on page load
    document.addEventListener('DOMContentLoaded', async () => {
      console.log('Page loaded, initializing...');
      await loadRsvpData();
    });

    // Auto-refresh every 30 seconds
    setInterval(loadRsvpData, 30000);
  </script>
</body>
</html>
